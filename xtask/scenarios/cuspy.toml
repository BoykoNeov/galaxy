# The M5g payoff: a parabolic coplanar-PROGRADE encounter of two COLD disks in
# live cuspy (exponentially-truncated NFW) halos -> tidal tails riding on the
# realistic rising-to-flat rotation curve. The disks are cold because the warm
# dispersion reads halo rho(r), which diverges at an NFW cusp (DESIGN M5f); the
# stabilization is RESOLUTION — halo N high and eps small enough that the live
# inner N-body force matches the analytic G*M(<r)/r^2 the disk is placed on.
# QUICK keeps the halo N high enough to still resolve the cusp. This preset
# reproduces the hardcoded `cuspy` scenario bit-for-bit.

name = "cuspy"
seed = 0x0CA5_D15C

[model]
kind = "disk-nfw"

[model.galaxy1]
disk_mass = 0.12
scale_length = 0.6
hz_frac = 0.1
rmax_frac = 3.0
# cold: no toomre_q (warm-in-a-cusp is a scoped follow-up, DESIGN M5f)
halo = { mvir = 1.0, rs = 1.0, c = 10.0, skirt = 3.0 } # r_vir = 10

[model.galaxy2]
disk_mass = 0.08
scale_length = 0.5
hz_frac = 0.1
rmax_frac = 3.0
halo = { mvir = 0.7, rs = 0.9, c = 10.0, skirt = 2.7 } # r_vir = 9

[model.counts.full]
halo1 = 10000
disk1 = 5000
halo2 = 8000
disk2 = 4000

[model.counts.quick]
halo1 = 5000
disk1 = 3000
halo2 = 4000
disk2 = 2000

[orbit]
eccentricity = 1.0
pericenter = 1.5
separation = 8.0

[sim]
dt = 0.02
n_steps = 1500
snapshot_every = 25
eps = 0.02 # 0.02 r_s — between the disk movie's 0.05 and the M5f deep-cusp 0.01

[look]
splat_size = 0.15
# The cuspy halo dwarfs the disk (r_vir=10 vs disk r_max~1.8): a high percentile
# would frame the diffuse halo and shrink the tails to dots.
frame_percentile = 0.7
palette = [[0.05, 0.035, 0.025], [1.0, 0.5, 0.25], [0.025, 0.035, 0.05], [0.35, 0.6, 1.0]]
sf_progenitors = [1, 3]

[[look.ramps]]
inner = [0.05, 0.035, 0.025]
outer = [0.05, 0.035, 0.025]

[[look.ramps]]
inner = [1.0, 0.35, 0.1]
outer = [0.55, 0.75, 1.0]

[[look.ramps]]
inner = [0.025, 0.035, 0.05]
outer = [0.025, 0.035, 0.05]

[[look.ramps]]
inner = [1.0, 0.3, 0.45]
outer = [0.4, 0.9, 0.9]

# The M6d choreography: start 3/4-inclined, orbit slowly through first pericenter,
# settle toward face-on as the tails extend (tails read best face-on).
[rig]
kind = "orbit-tilt"
azimuth_deg = [-90.0, 40.0]
tilt_deg = [55.0, 25.0]
window = 8
