# The original M3 movie: a parabolic coplanar-PROGRADE encounter of two rotating
# warm exponential-disk galaxies (Toomre Q = 1.5), each a low-mass disk in a live
# Plummer halo -> thin curved tidal tails. This preset reproduces the hardcoded
# `disk` scenario bit-for-bit (same params, same seed => same movie); the gate in
# `xtask/src/spec.rs` holds it to that.

name = "disk"
seed = 0x00C0_FFEE

[model]
kind = "disk-plummer"

[model.galaxy1]
disk_mass = 0.15
scale_length = 0.5
hz_frac = 0.1
rmax_frac = 4.0
toomre_q = 1.5
halo = { mass = 1.0, scale = 1.0 }

[model.galaxy2]
disk_mass = 0.1
scale_length = 0.45
hz_frac = 0.1
rmax_frac = 4.0
toomre_q = 1.5
halo = { mass = 0.7, scale = 0.9 }

[model.counts.full]
halo1 = 5000
disk1 = 5000
halo2 = 3500
disk2 = 3500

[model.counts.quick]
halo1 = 1500
disk1 = 1500
halo2 = 1000
disk2 = 1000

[orbit]
eccentricity = 1.0 # parabolic — the classic Toomre encounter
pericenter = 1.5
separation = 8.0

[sim]
dt = 0.02
n_steps = 1500
snapshot_every = 25 # -> ~61 snapshots
eps = 0.05

[look]
splat_size = 0.12
frame_percentile = 0.98
# progenitor palette: halo1 (dim warm), disk1 (warm), halo2 (dim cool), disk2 (cool)
palette = [[0.05, 0.035, 0.025], [1.0, 0.5, 0.25], [0.025, 0.035, 0.05], [0.35, 0.6, 1.0]]
sf_progenitors = [1, 3] # only the disks form "stars" — halos are dark matter

# --color initial-radius ramps: halos constant at their dim palette color, disks
# inner = warm/old -> outer = blue/young (amber->blue-white vs rose->cyan).
[[look.ramps]]
inner = [0.05, 0.035, 0.025]
outer = [0.05, 0.035, 0.025]

[[look.ramps]]
inner = [1.0, 0.35, 0.1]
outer = [0.55, 0.75, 1.0]

[[look.ramps]]
inner = [0.025, 0.035, 0.05]
outer = [0.025, 0.035, 0.05]

[[look.ramps]]
inner = [1.0, 0.3, 0.45]
outer = [0.4, 0.9, 0.9]

# The original M3 movie keeps its static face-on framing — the back-compat exemplar.
[rig]
kind = "static"
