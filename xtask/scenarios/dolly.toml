# The M6g demo: the cuspy encounter (same physics realization, bit-for-bit —
# see cuspy.toml for the physics rationale) shot as a slow PERSPECTIVE dolly
# toward/through the merger remnant. The camera approaches from a 3/4 view
# along a fixed direction with constant fov (a camera move, not a zoom):
# distances are fractions of the final framing radius, easing from well
# outside the scene into the remnant's halo field, where foreground stars
# sweep past and cull at the near plane.

name = "dolly"
seed = 0x0CA5_D15C

[model]
kind = "disk-nfw"

[model.galaxy1]
disk_mass = 0.12
scale_length = 0.6
hz_frac = 0.1
rmax_frac = 3.0
# cold: no toomre_q (warm-in-a-cusp is a scoped follow-up, DESIGN M5f)
halo = { mvir = 1.0, rs = 1.0, c = 10.0, skirt = 3.0 } # r_vir = 10

[model.galaxy2]
disk_mass = 0.08
scale_length = 0.5
hz_frac = 0.1
rmax_frac = 3.0
halo = { mvir = 0.7, rs = 0.9, c = 10.0, skirt = 2.7 } # r_vir = 9

[model.counts.full]
halo1 = 10000
disk1 = 5000
halo2 = 8000
disk2 = 4000

[model.counts.quick]
halo1 = 5000
disk1 = 3000
halo2 = 4000
disk2 = 2000

[orbit]
eccentricity = 1.0
pericenter = 1.5
separation = 8.0

[sim]
dt = 0.02
n_steps = 1500
snapshot_every = 25
eps = 0.02 # 0.02 r_s — between the disk movie's 0.05 and the M5f deep-cusp 0.01

[look]
splat_size = 0.15
# The cuspy halo dwarfs the disk (r_vir=10 vs disk r_max~1.8): a high percentile
# would frame the diffuse halo and shrink the tails to dots.
frame_percentile = 0.7
palette = [[0.05, 0.035, 0.025], [1.0, 0.5, 0.25], [0.025, 0.035, 0.05], [0.35, 0.6, 1.0]]
sf_progenitors = [1, 3]

[[look.ramps]]
inner = [0.05, 0.035, 0.025]
outer = [0.05, 0.035, 0.025]

[[look.ramps]]
inner = [1.0, 0.35, 0.1]
outer = [0.55, 0.75, 1.0]

[[look.ramps]]
inner = [0.025, 0.035, 0.05]
outer = [0.025, 0.035, 0.05]

[[look.ramps]]
inner = [1.0, 0.3, 0.45]
outer = [0.4, 0.9, 0.9]

# The M6g choreography: a slow dolly from 5× the final framing radius down to
# 0.8× — into the remnant's halo field — from a fixed 3/4 view (55° tilt shows
# the tails in depth as parallax takes over). fov 55° reads "long lens" at the
# start and fills with the remnant at the end; near plane close so fly-past
# stars stay visible until the last moment. End distance tuned by A/B re-render
# of retained QUICK snapshots (0.35 / 0.5 / 0.65 / 0.8): 0.35 dives so deep the
# closing stills are a wall of out-of-focus splats (great in motion, unreadable
# parked); 0.8 keeps both nuclei and the star field resolved while the soft
# foreground still sells the depth.
[rig]
kind = "dolly"
direction_deg = [-60.0, 55.0]
distance_frac = [5.0, 0.8]
fov_deg = 55.0
near_frac = 0.02
