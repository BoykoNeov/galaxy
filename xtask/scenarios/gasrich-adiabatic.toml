# The `gasrich` showpiece with an ADIABATIC gas EOS (incandescent-nebular-veil, H5).
# Identical geometry, orbit, stellar populations, and volumetric look to `gasrich`,
# but each disk's SPH gas evolves its internal energy `u` via `P=(Œ≥‚àí1)œÅu` (Œ≥ = 5/3
# monatomic) instead of the isothermal `P=c_s¬≤œÅ`. That lets shock heating ‚Äî chiefly
# the pericenter compression ‚Äî RAISE the gas temperature, which the
# `[look.gas.temperature]` colormap paints (cold disk red ‚Üí shocked gas blue-white).
#
# WHY THE IC STILL CARRIES `sound_speed`: it seeds the gas velocity/pressure
# equilibrium AND the initial internal energy `u = c_s¬≤/(Œ≥‚àí1)` (spec.rs), so the t=0
# pressure `(Œ≥‚àí1)œÅu` equals the isothermal `c_s¬≤œÅ` the sampler bakes. The disk starts
# in true force balance ‚Äî no spurious startup contraction/heating that would
# manufacture fake temperature ‚Äî so only real shocks light up the colormap. The
# initial adiabatic sound speed is then `c_s‚àöŒ≥` (~29% stiffer than isothermal), so the
# adaptive dt opens a touch smaller; the E4a per-particle adiabatic CFL reads it from `u`.
#
# ADIABATIC ‚áí ADAPTIVE, CPU: the fixed-dt CflGuard assumes one isothermal c_s (it
# would panic on the per-particle adiabatic sound speed), and GPU adiabatic is
# deferred ‚Äî so `simulate_snapshots` REQUIRES [sim.adaptive] and the CPU backend for
# this preset (enforced; a mis-run fails loud, never silently isothermal).
#
# See `gasrich.toml` for the full rationale on f_gas / c_s / the look knobs ‚Äî all
# unchanged here. The temperature BAND below is PROVISIONAL (set from the QUICK smoke's
# u-distribution; full-res shock heating differs, so expect to re-tune u_hi).

name = "gasrich-adiabatic"
seed = 0x00C0_FFEE # the validated QUICK-clean realization (see gasrich's CFL note)

[model]
kind = "disk-plummer"

# Shared adiabatic gas component: one table ‚áí the SAME f_gas, c_s, and Œ≥ on both disks.
# `gamma` switches the EOS to adiabatic; `u_floor` guards a rarefaction undershoot into
# negative u / NaN c_s on the strong merger (a small positive floor, inert until needed ‚Äî
# watch its reported leak on the full-res run).
[model.gas]
fraction = 0.3
sound_speed = 0.1
gamma = 1.6666666666666667 # 5/3, monatomic ideal gas
u_floor = 1.0e-6

[model.galaxy1]
disk_mass = 0.15
scale_length = 0.5
hz_frac = 0.1
rmax_frac = 4.0
toomre_q = 1.5
halo = { mass = 1.0, scale = 1.0 }

[model.galaxy2]
disk_mass = 0.1
scale_length = 0.45
hz_frac = 0.1
rmax_frac = 4.0
toomre_q = 1.5
halo = { mass = 0.7, scale = 0.9 }

[model.counts.full]
halo1 = 5000
disk1 = 5000
halo2 = 3500
disk2 = 3500
gas1 = 4000
gas2 = 3000

[model.counts.quick]
halo1 = 1500
disk1 = 1500
halo2 = 1000
disk2 = 1000
gas1 = 1500
gas2 = 1000

[orbit]
eccentricity = 1.0 # parabolic ‚Äî the classic Toomre encounter
pericenter = 1.5
separation = 8.0

[sim]
# Block-adaptive dt is MANDATORY for adiabatic gas (see the header). `dt` only fixes the
# snapshot cadence: output_dt = snapshot_every ¬∑ dt = 0.5.
dt = 0.005
n_steps = 6000 # T = 30
snapshot_every = 100 # -> 61 snapshots
eps = 0.05

# Adaptive timestepping at the shipped defaults (courant 0.25, growth 1.25, block 16).
[sim.adaptive]

[look]
splat_size = 0.12
max_splat_px = 2.0
frame_percentile = 0.92
palette = [[0.05, 0.035, 0.025], [1.0, 0.5, 0.25], [0.025, 0.035, 0.05], [0.35, 0.6, 1.0]]
sf_progenitors = [1, 3]

# Volumetric gas look ‚Äî the tuned `gasrich` showpiece knobs, unchanged. The one addition
# is [look.gas.temperature]: the emission color is now driven by ≈´ = N/œÅ (the SPH
# internal-energy moment) across a fixed band, instead of the flat `color`. `color` still
# tints the SCATTERED starlight, so it stays.
[look.gas]
color = [0.4, 0.58, 1.0]
emissivity = 20.0
opacity = 100.0
scattering = 800.0
anisotropy = 0.5
scatter_tint = [0.6, 0.8, 1.3]
shadows = true
shadow_bake = "dda"

# Temperature colormap (incandescent-nebular-veil): cold gas (≈´ ‚â§ u_lo) renders the
# physically-honest blackbody RED, hot shocked gas (≈´ ‚â• u_hi) blue-white ‚Äî hotter = bluer
# (Wien). The BAND is provisional: the quiescent disk starts at ≈´ = u_init = c_s¬≤/(Œ≥‚àí1) =
# 0.015, so u_lo pins the cold disk to red; u_hi is a first guess at the pericenter-shock
# ceiling and is the knob to re-tune from the QUICK smoke's u-distribution (re-render cost).
[look.gas.temperature]
cold = [0.75, 0.13, 0.05]
hot = [0.75, 0.82, 1.0]
u_lo = 0.015
u_hi = 0.15

[look.local_tone]
strength = 2.0

[[look.ramps]]
inner = [0.05, 0.035, 0.025]
outer = [0.05, 0.035, 0.025]

[[look.ramps]]
inner = [1.0, 0.35, 0.1]
outer = [0.55, 0.75, 1.0]

[[look.ramps]]
inner = [0.025, 0.035, 0.05]
outer = [0.025, 0.035, 0.05]

[[look.ramps]]
inner = [1.0, 0.3, 0.45]
outer = [0.4, 0.9, 0.9]

[rig]
kind = "orbit-tilt"
azimuth_deg = [-45.0, 45.0]
tilt_deg = [35.0, 25.0]
window = 6
