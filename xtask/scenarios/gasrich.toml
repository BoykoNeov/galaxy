# M7f showpiece: the `disk` parabolic prograde encounter made GAS-RICH. Each warm
# Plummer-disk galaxy carries an isothermal SPH gas layer (f_gas = 0.3 of the disk
# mass) that renders volumetrically — emission in the tidal bridge, absorption
# (dust lanes) over the stellar cores. The sound speed c_s = 0.05 sets a
# marginally-stable gas disk (min Q_gas ~= 2.0 / 2.4 for the two disks): gas-rich
# enough for dark lanes, with headroom over Q = 1 for the pericenter compression
# (isothermal has no fragmentation physics, so a sub-1 dip would clump artificially).
#
# The stellar populations and orbit are the `disk` preset's; gas SPLITS the disk
# mass (traces the same exponential), so the stellar rotation curve and tidal
# morphology are unchanged. Small dt = 0.005 with the CflGuard sentinel keeps the
# gas hydro stable through pericenter (t=0 CFL bound ~9x this on the QUICK demo).

name = "gasrich"
seed = 0x0DA5_1DEA

[model]
kind = "disk-plummer"

# The shared gas component (one table => the SAME f_gas and c_s on both disks: the
# isothermal solver's c_s is a single global, so two gas pops cannot differ in it).
[model.gas]
fraction = 0.3
sound_speed = 0.05

[model.galaxy1]
disk_mass = 0.15
scale_length = 0.5
hz_frac = 0.1
rmax_frac = 4.0
toomre_q = 1.5
halo = { mass = 1.0, scale = 1.0 }

[model.galaxy2]
disk_mass = 0.1
scale_length = 0.45
hz_frac = 0.1
rmax_frac = 4.0
toomre_q = 1.5
halo = { mass = 0.7, scale = 0.9 }

[model.counts.full]
halo1 = 5000
disk1 = 5000
halo2 = 3500
disk2 = 3500
gas1 = 4000
gas2 = 3000

[model.counts.quick]
halo1 = 1500
disk1 = 1500
halo2 = 1000
disk2 = 1000
gas1 = 1500
gas2 = 1000

[orbit]
eccentricity = 1.0 # parabolic — the classic Toomre encounter
pericenter = 1.5
separation = 8.0

[sim]
dt = 0.005 # small: gas hydro CFL (colder, thinner gas disk than the demo's c_s=0.1)
n_steps = 6000 # T = 30, same physical span as `disk` (1500 * 0.02)
snapshot_every = 100 # -> 61 snapshots, matching the `disk` cadence
eps = 0.05

[look]
splat_size = 0.12
frame_percentile = 0.92 # tighter than `disk` — keep the frame on the gassy cores
# progenitor palette: halo1 (dim warm), disk1 (warm), halo2 (dim cool), disk2 (cool).
# Gas is NOT a splat (it renders volumetrically) — its color lives in [look.gas].
palette = [[0.05, 0.035, 0.025], [1.0, 0.5, 0.25], [0.025, 0.035, 0.05], [0.35, 0.6, 1.0]]
sf_progenitors = [1, 3] # only the disks form "stars" — halos are dark matter

# Volumetric gas look (M7f): cool blue-white emission with strong extinction so the
# gas glows in the bridge and lays dark dust lanes over the cores. Emissivity j and
# opacity kappa are tuned by eyeball against the QUICK render (re-render cost only —
# the density grid carries rho alone). Grid resolution is NOT here: it is a global
# quality constant (64^3 QUICK / 128^3 full), like the frame dimensions.
[look.gas]
color = [0.5, 0.6, 0.95]
emissivity = 0.25
opacity = 12.0

[[look.ramps]]
inner = [0.05, 0.035, 0.025]
outer = [0.05, 0.035, 0.025]

[[look.ramps]]
inner = [1.0, 0.35, 0.1]
outer = [0.55, 0.75, 1.0]

[[look.ramps]]
inner = [0.025, 0.035, 0.05]
outer = [0.025, 0.035, 0.05]

[[look.ramps]]
inner = [1.0, 0.3, 0.45]
outer = [0.4, 0.9, 0.9]

# A gentle near-face-on reveal so the dust lanes read over the cores through the
# merger (the showpiece — not a back-compat exemplar).
[rig]
kind = "orbit-tilt"
azimuth_deg = [-45.0, 45.0]
tilt_deg = [70.0, 45.0]
window = 6
