# M7f showpiece: the `disk` parabolic prograde encounter made GAS-RICH. Each warm
# Plummer-disk galaxy carries an isothermal SPH gas layer (f_gas = 0.3 of the disk
# mass) that renders volumetrically — emission in the tidal bridge, absorption
# (dust lanes) over the stellar cores.
#
# GAS RICHNESS (f_gas), not the sound speed, sets the dark lanes: viewed face-on
# the column density is ∫ρ dz = Σ_gas = f·Σ, INDEPENDENT of the layer thickness c_s
# sets. So with this near-face-on rig c_s is free, and c_s = 0.1 (min Q_gas ~= 4.0
# / 4.7) is chosen WARM for two reasons — neither of them CFL: (1) higher Q widens
# the margin against the artificial clumping isothermal gas (no fragmentation
# physics) is prone to under merger compression; (2) warming is aesthetically free
# here, since face-on lane depth is c_s-independent. It does NOT buy a bigger step:
# at QUICK (2500-gas) resolution the running CFL bound is set by the compressed
# midplane density of the realization, not by c_s (measured: warming c_s 0.05->0.1
# moved the running bound only ~0.0043 -> ~0.0048), and it keeps declining through
# the merger as the gas concentrates. That bound is realization-sensitive at this
# resolution — some seeds grow a dense knot that drags it below 0.002. This preset's
# SEED is one whose QUICK realization stays clean and rides dt = 0.005 for the whole
# merger with the CflGuard never tripping (it matches the validated M7c QUICK demo).
# FULL resolution (denser, smoother gas sampling) is the robust regime and a
# deliberate user call — its wall-clock is the standing GPU-SPH gate. A colder
# marginal-Q disk (the plan's Q ~= 1.5-2) is left to that better-resolved pass: at
# QUICK resolution it under-resolves the thin sech² layer AND clumps, needing a
# punishing dt for no gain in the face-on lanes.
#
# The stellar populations and orbit are the `disk` preset's; gas SPLITS the disk
# mass (traces the same exponential), so the stellar rotation curve and tidal
# morphology are unchanged.

name = "gasrich"
seed = 0x00C0_FFEE # the validated QUICK-clean realization (see the CFL note above)

[model]
kind = "disk-plummer"

# The shared gas component (one table => the SAME f_gas and c_s on both disks: the
# isothermal solver's c_s is a single global, so two gas pops cannot differ in it).
[model.gas]
fraction = 0.3
sound_speed = 0.1

[model.galaxy1]
disk_mass = 0.15
scale_length = 0.5
hz_frac = 0.1
rmax_frac = 4.0
toomre_q = 1.5
halo = { mass = 1.0, scale = 1.0 }

[model.galaxy2]
disk_mass = 0.1
scale_length = 0.45
hz_frac = 0.1
rmax_frac = 4.0
toomre_q = 1.5
halo = { mass = 0.7, scale = 0.9 }

[model.counts.full]
halo1 = 5000
disk1 = 5000
halo2 = 3500
disk2 = 3500
gas1 = 4000
gas2 = 3000

[model.counts.quick]
halo1 = 1500
disk1 = 1500
halo2 = 1000
disk2 = 1000
gas1 = 1500
gas2 = 1000

[orbit]
eccentricity = 1.0 # parabolic — the classic Toomre encounter
pericenter = 1.5
separation = 8.0

[sim]
dt = 0.005 # gas hydro CFL: this seed's QUICK realization stays clean at 0.005
n_steps = 6000 # T = 30, same physical span as `disk` (1500 * 0.02)
snapshot_every = 100 # -> 61 snapshots, matching the `disk` cadence
eps = 0.05

[look]
splat_size = 0.12
# Screen-space PSF cap (pinprick-starfield): the breathing orbit-tilt zoom makes
# the fixed WORLD-space splats balloon to ~12 px blobs in the compact early shots
# (reads as defocus) and shrink to sharp ~3 px points once the tails widen the
# framing. The cap is the point-source camera model — stars stay point-like at
# any zoom, flux-conserving (clamping down concentrates emission; bright cores
# saturate like a real astrophoto). HALF-extent in pixels, resolution-LITERAL:
# tuned on QUICK 360p; a FULL 1080p render wants ~3x this value for the same
# relative look. Remove the knob to restore the uncapped M6g behavior bit-for-bit.
max_splat_px = 3.0
frame_percentile = 0.92 # tighter than `disk` — keep the frame on the gassy cores
# progenitor palette: halo1 (dim warm), disk1 (warm), halo2 (dim cool), disk2 (cool).
# Gas is NOT a splat (it renders volumetrically) — its color lives in [look.gas].
palette = [[0.05, 0.035, 0.025], [1.0, 0.5, 0.25], [0.025, 0.035, 0.05], [0.35, 0.6, 1.0]]
sf_progenitors = [1, 3] # only the disks form "stars" — halos are dark matter

# Volumetric gas look (M7f): cool blue emission + extinction so the gas glows in the
# tidal bridge and dims the stellar cores. The knobs are DENSITY-REGIME dependent —
# both scale inversely with the gas ρ the grid holds. The M7e placeholders (κ≈14,
# j≈0.4) were tuned on a DENSE synthetic disk (ρ~1); this merger's gas is ρ~0.1–0.5,
# so the same visual needs ~an order of magnitude more κ and j (that's why the movie
# gas looked invisible until it was tuned here — deposition always ran, the look was
# just far too weak for the regime). At QUICK (2500 gas / 64³) the gas is intrinsically
# SOFT — few particles ⇒ large SPH h ⇒ a smooth blobby field, not sharp dust lanes;
# 128³ raises peak ρ but not the visible sharpness (particle count, not grid res, is the
# limiter). Sharp lanes are the FULL-res + more-edge-on story (the user-gated showpiece).
# Grid resolution is NOT a look knob: it is a global quality constant (64³/128³), like
# the frame dimensions. Tuned by eyeball on the QUICK render; re-render cost only.
[look.gas]
color = [0.4, 0.58, 1.0]
emissivity = 20.0
opacity = 100.0
# Single-scatter starlight (scattered-starlit-veil), the OPTION under judgement
# against the plain M7e emission+absorption look: gas near the stellar cores picks
# up THEIR warm light (scattered radiance carries the light's own RGB — it is not
# tinted by `color`), and the forward-peaked phase (anisotropy > 0) rim-lights
# backlit gas. DISABLE by setting `scattering = 0` (and removing `anisotropy`) —
# that path is gated bit-identical to the pre-scatter renderer. Like κ/j these are
# density-regime knobs, tuned by eyeball on the QUICK render at re-render cost.
# Scale note: the flux ~ L/(4π d²) with d in sim units (tens), so useful strengths
# are O(10²–10³) — the QUICK A/B bracket (2 / 200 / 800) picked 800: per-disk
# ambient glow + a lit gas bridge at approach, background stays black (no fog).
scattering = 800.0
anisotropy = 0.5
# Per-light shadow volumes (umbral-lantern-lattice): gas deep in its own optical
# thickness (κ = 100 makes midplanes many τ) stops glowing from inside — the QUICK
# A/B (M:\claud_projects\temp\shadow_ab) shows ~11% less mid-frame scattered flux,
# core haze slightly tightened, ambient glow and the lit bridge intact. σ = 800
# kept (the change is well inside the 200/800 bracket's step). DISABLE by removing
# this knob — that path is gated bit-identical to the unshadowed v1 scatter.
shadows = true

[[look.ramps]]
inner = [0.05, 0.035, 0.025]
outer = [0.05, 0.035, 0.025]

[[look.ramps]]
inner = [1.0, 0.35, 0.1]
outer = [0.55, 0.75, 1.0]

[[look.ramps]]
inner = [0.025, 0.035, 0.05]
outer = [0.025, 0.035, 0.05]

[[look.ramps]]
inner = [1.0, 0.3, 0.45]
outer = [0.4, 0.9, 0.9]

# A moderately edge-on reveal: tilting the encounter toward edge-on lengthens the
# line of sight through the thin gas layer, so the gas reads over the starlight
# (the showpiece — not a back-compat exemplar).
[rig]
kind = "orbit-tilt"
azimuth_deg = [-45.0, 45.0]
tilt_deg = [35.0, 25.0]
window = 6
